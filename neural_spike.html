<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Spiking Neural Network</title>
<style>
* { margin: 0; padding: 0; }
body { background: #000; overflow: hidden; cursor: none; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const W = () => canvas.width;
const H = () => canvas.height;

// Neural network parameters - kept light for Atom CPU
const NUM_NEURONS = 60;
const CONNECTION_PROB = 0.08;
const SPIKE_THRESHOLD = 1.0;
const RESTING_POTENTIAL = 0.0;
const DECAY_RATE = 0.97;
const REFRACTORY_PERIOD = 30;
const SPONTANEOUS_RATE = 0.003;
const SPIKE_WEIGHT_MIN = 0.15;
const SPIKE_WEIGHT_MAX = 0.45;
const TRAIL_LENGTH = 80;

class Neuron {
  constructor(x, y, layer) {
    this.x = x;
    this.y = y;
    this.layer = layer;
    this.potential = RESTING_POTENTIAL;
    this.spiking = false;
    this.spikeTime = 0;
    this.refractoryTimer = 0;
    this.connections = [];
    this.radius = 4 + Math.random() * 4;
    this.pulsePhase = Math.random() * Math.PI * 2;
    this.spikeHistory = [];
    this.inhibitory = Math.random() < 0.2;
  }

  update(frame) {
    this.pulsePhase += 0.02;

    if (this.refractoryTimer > 0) {
      this.refractoryTimer--;
      this.potential *= 0.9;
      this.spiking = false;
      return;
    }

    // Spontaneous firing
    if (Math.random() < SPONTANEOUS_RATE) {
      this.potential += 0.3 + Math.random() * 0.3;
    }

    // Decay toward resting
    this.potential *= DECAY_RATE;

    // Check threshold
    if (this.potential >= SPIKE_THRESHOLD) {
      this.spiking = true;
      this.spikeTime = frame;
      this.refractoryTimer = REFRACTORY_PERIOD + Math.floor(Math.random() * 15);
      this.spikeHistory.push(frame);
      if (this.spikeHistory.length > TRAIL_LENGTH) this.spikeHistory.shift();

      // Propagate to connected neurons
      for (const conn of this.connections) {
        const weight = conn.weight * (this.inhibitory ? -0.5 : 1.0);
        conn.target.receiveSpike(weight, conn.delay);
      }
    } else {
      this.spiking = false;
    }
  }

  receiveSpike(weight, delay) {
    setTimeout(() => {
      if (this.refractoryTimer <= 0) {
        this.potential += weight;
      }
    }, delay);
  }

  draw(ctx, frame) {
    const w = W(), h = H();

    // Draw neuron body
    const pulse = Math.sin(this.pulsePhase) * 0.3 + 0.7;
    const baseBrightness = 0.15 + this.potential * 0.3;
    const brightness = Math.min(1, baseBrightness * pulse);

    // Spike flash
    let flashAlpha = 0;
    if (this.spiking || (frame - this.spikeTime < 12)) {
      const t = (frame - this.spikeTime) / 12;
      flashAlpha = Math.max(0, 1 - t);
    }

    // Glow
    if (flashAlpha > 0.1) {
      const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 6);
      if (this.inhibitory) {
        grd.addColorStop(0, `rgba(255, 50, 50, ${flashAlpha * 0.4})`);
        grd.addColorStop(1, 'rgba(255, 0, 0, 0)');
      } else {
        grd.addColorStop(0, `rgba(0, 255, 120, ${flashAlpha * 0.5})`);
        grd.addColorStop(1, 'rgba(0, 255, 65, 0)');
      }
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius * 6, 0, Math.PI * 2);
      ctx.fill();
    }

    // Soma
    const r = this.radius + flashAlpha * 3;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    if (this.inhibitory) {
      ctx.fillStyle = `rgba(${Math.floor(100 + flashAlpha * 155)}, ${Math.floor(20 + brightness * 30)}, ${Math.floor(20 + brightness * 30)}, ${0.5 + brightness * 0.5})`;
      ctx.strokeStyle = `rgba(255, 80, 80, ${0.3 + flashAlpha * 0.7})`;
    } else {
      ctx.fillStyle = `rgba(0, ${Math.floor(80 + brightness * 175)}, ${Math.floor(30 + brightness * 60)}, ${0.5 + brightness * 0.5})`;
      ctx.strokeStyle = `rgba(0, 255, 100, ${0.3 + flashAlpha * 0.7})`;
    }
    ctx.fill();
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Membrane potential indicator (inner ring)
    if (this.potential > 0.1) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, r * 0.6, 0, Math.PI * 2 * Math.min(1, this.potential / SPIKE_THRESHOLD));
      ctx.strokeStyle = `rgba(0, 255, 200, ${Math.min(0.8, this.potential * 0.6)})`;
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }
}

class SpikeTravel {
  constructor(source, target, startFrame, weight) {
    this.sx = source.x;
    this.sy = source.y;
    this.tx = target.x;
    this.ty = target.y;
    this.startFrame = startFrame;
    this.duration = 15 + Math.random() * 20;
    this.alive = true;
    this.inhibitory = source.inhibitory;
    this.weight = Math.abs(weight);
  }

  update(frame) {
    if (frame - this.startFrame > this.duration) {
      this.alive = false;
    }
  }

  draw(ctx, frame) {
    const t = (frame - this.startFrame) / this.duration;
    if (t < 0 || t > 1) return;

    const x = this.sx + (this.tx - this.sx) * t;
    const y = this.sy + (this.ty - this.sy) * t;

    // Traveling pulse
    const alpha = Math.sin(t * Math.PI) * 0.9;
    const size = 2 + this.weight * 4;

    const grd = ctx.createRadialGradient(x, y, 0, x, y, size * 3);
    if (this.inhibitory) {
      grd.addColorStop(0, `rgba(255, 100, 100, ${alpha})`);
      grd.addColorStop(1, 'rgba(255, 0, 0, 0)');
    } else {
      grd.addColorStop(0, `rgba(100, 255, 150, ${alpha})`);
      grd.addColorStop(1, 'rgba(0, 255, 65, 0)');
    }
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(x, y, size * 3, 0, Math.PI * 2);
    ctx.fill();

    // Bright core
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fillStyle = this.inhibitory
      ? `rgba(255, 180, 180, ${alpha})`
      : `rgba(180, 255, 200, ${alpha})`;
    ctx.fill();
  }
}

// Create neurons in layered arrangement
const neurons = [];
const layers = 5;
const margin = 80;

for (let l = 0; l < layers; l++) {
  const neuronsInLayer = Math.floor(NUM_NEURONS / layers) + (l === Math.floor(layers/2) ? NUM_NEURONS % layers : 0);
  for (let n = 0; n < neuronsInLayer; n++) {
    const lx = margin + (W() - margin * 2) * (l / (layers - 1));
    const ly = margin + (H() - margin * 2) * ((n + 0.5) / neuronsInLayer);
    // Add some jitter
    const jx = lx + (Math.random() - 0.5) * 80;
    const jy = ly + (Math.random() - 0.5) * 60;
    neurons.push(new Neuron(jx, jy, l));
  }
}

// Create connections (preferring forward connections but allowing recurrent)
for (const n1 of neurons) {
  for (const n2 of neurons) {
    if (n1 === n2) continue;
    const dx = n2.x - n1.x;
    const dy = n2.y - n1.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    // Forward bias
    let prob = CONNECTION_PROB;
    if (n2.layer > n1.layer) prob *= 2.5;
    else if (n2.layer === n1.layer) prob *= 1.2;
    else prob *= 0.4;

    // Distance falloff
    prob *= Math.max(0, 1 - dist / (W() * 0.6));

    if (Math.random() < prob) {
      n1.connections.push({
        target: n2,
        weight: SPIKE_WEIGHT_MIN + Math.random() * (SPIKE_WEIGHT_MAX - SPIKE_WEIGHT_MIN),
        delay: Math.floor(dist * 0.1 + Math.random() * 30)
      });
    }
  }
}

// Spike travel animations
let spikeTravels = [];
let frame = 0;

// Track spikes for travel animation
const origUpdate = Neuron.prototype.update;
Neuron.prototype.update = function(f) {
  const wasSpiking = this.spiking;
  origUpdate.call(this, f);
  if (this.spiking && !wasSpiking) {
    for (const conn of this.connections) {
      spikeTravels.push(new SpikeTravel(this, conn.target, f, conn.weight));
    }
  }
};

// Raster plot data
const rasterData = [];
const RASTER_HEIGHT = 60;
const RASTER_WIDTH = 300;

// HUD stats
let totalSpikes = 0;
let spikeRate = 0;
let spikeWindow = [];

function drawConnections(ctx, frame) {
  for (const n of neurons) {
    for (const conn of n.connections) {
      const dx = conn.target.x - n.x;
      const dy = conn.target.y - n.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const alpha = 0.03 + (n.potential > 0.3 ? 0.04 : 0);

      ctx.beginPath();
      ctx.moveTo(n.x, n.y);

      // Slight curve
      const mx = (n.x + conn.target.x) / 2 + dy * 0.1;
      const my = (n.y + conn.target.y) / 2 - dx * 0.1;
      ctx.quadraticCurveTo(mx, my, conn.target.x, conn.target.y);

      ctx.strokeStyle = n.inhibitory
        ? `rgba(120, 30, 30, ${alpha})`
        : `rgba(0, 100, 50, ${alpha})`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }
}

function drawRasterPlot(ctx) {
  const rx = W() - RASTER_WIDTH - 30;
  const ry = H() - RASTER_HEIGHT - 30;

  // Background
  ctx.fillStyle = 'rgba(0, 10, 0, 0.7)';
  ctx.fillRect(rx - 2, ry - 18, RASTER_WIDTH + 4, RASTER_HEIGHT + 22);
  ctx.strokeStyle = 'rgba(0, 255, 65, 0.3)';
  ctx.strokeRect(rx - 2, ry - 18, RASTER_WIDTH + 4, RASTER_HEIGHT + 22);

  // Title
  ctx.font = '10px monospace';
  ctx.fillStyle = 'rgba(0, 255, 100, 0.6)';
  ctx.fillText('SPIKE RASTER', rx + 2, ry - 6);

  // Draw spikes
  const now = frame;
  for (let i = 0; i < neurons.length; i++) {
    const ny = ry + (i / neurons.length) * RASTER_HEIGHT;
    for (const st of neurons[i].spikeHistory) {
      const age = now - st;
      if (age < RASTER_WIDTH) {
        const sx = rx + RASTER_WIDTH - age;
        const alpha = Math.max(0.1, 1 - age / RASTER_WIDTH);
        ctx.fillStyle = neurons[i].inhibitory
          ? `rgba(255, 80, 80, ${alpha})`
          : `rgba(0, 255, 100, ${alpha})`;
        ctx.fillRect(sx, ny, 1.5, Math.max(1, RASTER_HEIGHT / neurons.length - 0.5));
      }
    }
  }
}

function drawHUD(ctx) {
  // Update spike rate
  spikeWindow = spikeWindow.filter(t => frame - t < 120);
  const rate = (spikeWindow.length / 120 * 60).toFixed(1);

  ctx.font = '12px monospace';
  ctx.fillStyle = 'rgba(0, 255, 100, 0.5)';

  const lines = [
    `NEURAL MESH ACTIVE`,
    `NEURONS: ${neurons.length}`,
    `SYNAPSES: ${neurons.reduce((s, n) => s + n.connections.length, 0)}`,
    `SPIKE RATE: ${rate} Hz`,
    `TOTAL SPIKES: ${totalSpikes}`,
    `FRAME: ${frame}`,
  ];

  const lx = 30;
  const ly = H() - RASTER_HEIGHT - 50;
  ctx.fillStyle = 'rgba(0, 10, 0, 0.6)';
  ctx.fillRect(lx - 5, ly - 15, 200, lines.length * 16 + 10);
  ctx.strokeStyle = 'rgba(0, 255, 65, 0.2)';
  ctx.strokeRect(lx - 5, ly - 15, 200, lines.length * 16 + 10);

  for (let i = 0; i < lines.length; i++) {
    ctx.fillStyle = i === 0 ? 'rgba(0, 255, 100, 0.7)' : 'rgba(0, 255, 100, 0.4)';
    ctx.fillText(lines[i], lx, ly + i * 16);
  }

  // Membrane potential bar chart (bottom left)
  const bx = 30;
  const by = H() - 25;
  ctx.fillStyle = 'rgba(0, 255, 100, 0.3)';
  ctx.font = '9px monospace';
  ctx.fillText('MEMBRANE POTENTIALS', bx, by - 5);
  for (let i = 0; i < Math.min(40, neurons.length); i++) {
    const v = Math.min(1, neurons[i].potential / SPIKE_THRESHOLD);
    const bw = v * 4;
    ctx.fillStyle = neurons[i].inhibitory
      ? `rgba(255, ${Math.floor(50 + v * 100)}, 50, 0.5)`
      : `rgba(0, ${Math.floor(100 + v * 155)}, ${Math.floor(50 + v * 50)}, 0.5)`;
    ctx.fillRect(bx + i * 5, by, 3, -bw * 8);
  }
}

function drawTitle(ctx) {
  ctx.font = '14px monospace';
  ctx.fillStyle = 'rgba(0, 255, 100, 0.4)';
  ctx.fillText('[ SPIKING NEURAL NETWORK SIMULATION ]', 30, 25);

  const time = new Date();
  const ts = time.toTimeString().split(' ')[0];
  ctx.fillStyle = 'rgba(0, 255, 100, 0.3)';
  ctx.fillText(ts, W() - 100, 25);
}

// Scanline overlay
function drawScanlines(ctx) {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.04)';
  for (let y = 0; y < H(); y += 3) {
    ctx.fillRect(0, y, W(), 1);
  }
}

function animate() {
  // Fade trail
  ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
  ctx.fillRect(0, 0, W(), H());

  // Subtle background grid
  if (frame % 4 === 0) {
    ctx.strokeStyle = 'rgba(0, 30, 10, 0.1)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x < W(); x += 60) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, H());
      ctx.stroke();
    }
    for (let y = 0; y < H(); y += 60) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W(), y);
      ctx.stroke();
    }
  }

  // Draw connections
  drawConnections(ctx, frame);

  // Update and draw spike travels
  spikeTravels = spikeTravels.filter(s => s.alive);
  for (const s of spikeTravels) {
    s.update(frame);
    s.draw(ctx, frame);
  }

  // Update and draw neurons
  let spikesThisFrame = 0;
  for (const n of neurons) {
    const was = n.spiking;
    n.update(frame);
    n.draw(ctx, frame);
    if (n.spiking && !was) {
      spikesThisFrame++;
      totalSpikes++;
      spikeWindow.push(frame);
    }
  }

  // Draw HUD elements
  drawTitle(ctx);
  drawRasterPlot(ctx);
  drawHUD(ctx);
  drawScanlines(ctx);

  frame++;
  requestAnimationFrame(animate);
}

// Initial burst to get things going
setTimeout(() => {
  for (let i = 0; i < 8; i++) {
    const n = neurons[Math.floor(Math.random() * neurons.length)];
    n.potential = SPIKE_THRESHOLD + 0.2;
  }
}, 100);

// Periodic stimulation waves
setInterval(() => {
  const layer = Math.floor(Math.random() * layers);
  const layerNeurons = neurons.filter(n => n.layer === layer);
  const count = Math.floor(Math.random() * 4) + 1;
  for (let i = 0; i < count; i++) {
    const n = layerNeurons[Math.floor(Math.random() * layerNeurons.length)];
    if (n) n.potential += 0.5 + Math.random() * 0.5;
  }
}, 800);

animate();
</script>
</body>
</html>
